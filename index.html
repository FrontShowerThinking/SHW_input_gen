<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Gen</title>
  </head>
  <body>
                  <div class="header">
            <div class="header-logo">GRN</div>
            <div>
                  <div class="header-title">Generador de imputaciones</div>
                  <div class="header-sub">Grünenthal · OWN 2026 PO1 &amp; PO2 · Operativa interna Showerthinking</div>
            </div>
      </div>

      <div class="main">

            <div class="card">
                  <div class="card-title">Configura tu imputación</div>
                  <div class="sel-grid">
                        <div class="field">
                              <label class="field-label"><span class="step-dot">1</span>Rol</label>
                              <select id="sel-rol" onchange="onRolChange()">
                                    <option value="">— Selecciona tu rol —</option>
                                    <option>Campaign Manager</option>
                                    <option>Front End</option>
                                    <option>Consultant</option>
                                    <option>Back End</option>
                                    <option>Specialist (QA)</option>
                              </select>
                        </div>
                        <div class="field">
                              <label class="field-label"><span class="step-dot">2</span>Tarea</label>
                              <select id="sel-tarea" onchange="onTareaChange()" disabled>
                                    <option value="">— Primero elige un rol —</option>
                              </select>
                        </div>
                        <div class="field">
                              <label class="field-label"><span class="step-dot">3</span>Descripción</label>
                              <select id="sel-desc" onchange="onDescChange()" disabled>
                                    <option value="">— Primero elige una tarea —</option>
                              </select>
                        </div>
                  </div>

                  <button class="btn-add" id="btn-add" onclick="addToQueue()" disabled>
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                              <line x1="12" y1="5" x2="12" y2="19" />
                              <line x1="5" y1="12" x2="19" y2="12" />
                        </svg>
                        Añadir a la imputación
                  </button>

                  <div class="queue" id="queue"></div>
            </div>

            <div class="result-card">
                  <div class="result-header">
                        <span class="result-label">Imputación final</span>
                        <span class="badge-ok" id="badge-ok">✓ Copiado</span>
                  </div>
                  <div class="result-body">
                        <div class="result-text empty" id="result-text">Añade al menos una tarea para ver la imputación</div>
                        <div class="btn-row" id="btn-row" style="display:none">
                              <button class="primary" onclick="copyText()">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                          <rect x="9" y="9" width="13" height="13" rx="2" />
                                          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                                    </svg>
                                    Copiar imputación
                              </button>
                              <button class="ghost" onclick="resetAll()">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                          <polyline points="1 4 1 10 7 10" />
                                          <path d="M3.51 15a9 9 0 1 0 .49-3.79" />
                                    </svg>
                                    Limpiar todo
                              </button>
                        </div>
                  </div>
            </div>

            <div class="card">
                  <div class="rec-title">Imputaciones recurrentes</div>
                  <div class="rec-list" id="rec-list"></div>
            </div>

      </div>

    <script src="script.js"></script>
  </body>
</html>
